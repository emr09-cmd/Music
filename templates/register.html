<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — MeloFree</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">Melo<span>Free</span></div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Free music, forever</p>

      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" class="auth-form">
        <div class="field-row">
          <div class="field-group">
            <label for="name">Full name</label>
            <input type="text" id="name" name="name" placeholder="Jane Doe" required>
          </div>
          <div class="field-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="janedoe" required autocomplete="username">
          </div>
        </div>
        <div class="field-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required autocomplete="email">
        </div>
        <div class="field-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
        </div>
        <button type="submit" class="auth-btn">Create account</button>
      </form>

      <p class="auth-footer">
        Already have an account?
        <a href="/login">Sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
